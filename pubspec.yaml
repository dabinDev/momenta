name: momenta
description: "银龄 AI 短视频助手"
publish_to: 'none'
version: 1.3.2+6

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.2
  dio: ^5.8.0+1
  get_storage: ^2.1.1
  flutter_secure_storage: ^9.2.4
  image_picker: ^1.1.2
  video_player: ^2.9.3
  path_provider: ^2.1.5
  path: ^1.9.0
  intl: ^0.20.2
  permission_handler: ^11.4.0
  gal: ^2.3.2
  speech_to_text: ^7.3.0
  url_launcher: ^6.3.1
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon/app_icon.png
  remove_alpha_ios: true
