server {
    listen 80;
    server_name token.cylonai.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name token.cylonai.cn;
    client_max_body_size 100m;

    ssl_certificate /etc/nginx/ssl/token.cylonai.cn_bundle.pem;
    ssl_certificate_key /etc/nginx/ssl/token.cylonai.cn.key;
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    sub_filter '</head>' '<link rel="stylesheet" href="/custom/custom.css"></head>';
    sub_filter 'href="/logo.png"' 'href="/custom/logo.png"';
    sub_filter_once off;

    location /custom/ {
        alias /etc/nginx/custom/;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://host.docker.internal:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
